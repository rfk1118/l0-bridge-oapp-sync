name: Sync OApp Index

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/sync.yml'
      - 'package.json'
      - 'scripts/**'
  schedule:
    # Every 30 minutes.
    - cron: '*/30 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

# Avoid overlapping runs if a previous one is slow.
concurrency:
  group: sync-oapp-index
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          # cache disabled (no lockfile committed)

      - run: npm install --no-audit --no-fund

      - name: Prepare data branch worktree
        run: |
          if git ls-remote --exit-code --heads origin data >/dev/null 2>&1; then
            git fetch origin data:data
            git worktree add ../oapp-index-data data
          else
            git worktree add --detach ../oapp-index-data
            git -C ../oapp-index-data switch --orphan data
            git -C ../oapp-index-data rm -rf . || true
          fi
          mkdir -p ../oapp-index-data/data

      - name: Run sync
        env:
          OAPP_INDEX_DIR: ../oapp-index-data/data
        run: npx tsx scripts/sync.ts

      - name: Commit updated index files
        run: |
          if [ -z "$(git -C ../oapp-index-data status --porcelain -- data)" ]; then
            echo "No index changes to commit."
            exit 0
          fi

          git -C ../oapp-index-data config user.name "github-actions[bot]"
          git -C ../oapp-index-data config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C ../oapp-index-data add data
          git -C ../oapp-index-data commit -m "chore: sync oapp index"
          git -C ../oapp-index-data push origin HEAD:data
