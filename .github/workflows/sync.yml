name: Sync OApp Index

on:
  schedule:
    # Every 30 minutes.
    - cron: '*/30 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

# Avoid overlapping runs if a previous one is slow.
concurrency:
  group: sync-oapp-index
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          # cache disabled (no lockfile committed)

      - run: npm install --no-audit --no-fund

      - name: Run sync
        run: npx tsx scripts/sync.ts

      - name: Commit updated index files
        run: |
          if [ -z "$(git status --porcelain -- data)" ]; then
            echo "No index changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git commit -m "chore: sync oapp index"
          git pull --rebase
          git push
